services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/hackclub/treasure-hunt-ysws-orchard:latest
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "3000:3000"
    restart: unless-stopped