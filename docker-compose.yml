services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HCA_CLIENT_ID: ${HCA_CLIENT_ID}
        HCA_CLIENT_SECRET: ${HCA_CLIENT_SECRET}
        HCA_REDIRECT_ADDRESS: ${HCA_REDIRECT_ADDRESS}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "3000:3000"
    restart: unless-stopped